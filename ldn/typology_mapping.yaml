# Using YAML rather than JSON to preserve comments

# Our level 1 classes
level1_classes:
  no_data:
    label: "No data"
    value: 255
    color: "rgb(255,255,255)"
  tree_cover:
    label: "Tree cover"
    value: 1
    color: "rgb(0,100,0)"
  grassland:
    label: "Grassland"
    value: 2
    color: "rgb(255,255,76)"
  cropland:
    label: "Cropland"
    value: 3
    color: "rgb(240,150,255)"
  wetland:
    label: "Wetland"
    value: 4
    color: "rgb(0,150,160)"
  built_up:
    label: "Built-up"
    value: 5
    color: "rgb(250,0,0)"
  water:
    label: "Water"
    value: 6
    color: "rgb(0,100,200)"
  other:
    label: "Other"
    value: 7
    color: "rgb(180,180,180)"


# Mappings from existing products to our level 1 classes
cci_lc_map:
    # No data
    # Map nodata to 255. That is what DEP Seagrass does. Works with uint8 and is more obviously not a valid class.
    0: 255
    # Cropland class -> Cropland
    10: 3
    11: 3
    12: 3
    20: 3
    30: 3
    # Natural Vegetation / Shrub class -> Grassland
    40: 2
    120: 2
    121: 2
    122: 2
    # Tree class -> Tree / Tree and shrub -> Tree cover
    50: 1
    60: 1
    61: 1
    62: 1
    70: 1
    71: 1
    72: 1
    80: 1
    81: 1
    82: 1
    90: 1
    100: 1
    # Grass and Herbaceous / Moss/Lichen -> Grassland
    110: 2
    130: 2
    140: 2
    # Sparse vegetation -> Grassland
    150: 2
    151: 2
    152: 2
    153: 2
    # Wetland
    160: 4
    170: 4
    180: 4
    # Built-up
    190: 5
    # Bare class / Snow/Ice -> other land
    200: 7
    201: 7
    202: 7
    220: 7
    # Water
    210: 6
# TODO: CCI needs to map more classes to Other (7). Right now it has no Other pixels in Singapore.

world_cover_map:
    # No data
    # Map nodata to 255. That is what DEP Seagrass does. Works with uint8 and is more obviously not a valid class.
    0: 255
    # Water
    80: 6
    # Tree -> Tree cover
    10: 1
    # Shrub / Grassland -> Grassland
    20: 2
    30: 2
    # Cropland
    40: 3
    # Built-up
    50: 5
    # Bare / Snow/Ice -> other land
    60: 7
    70: 7
    # Wetland / Mangroves -> Wetland
    90: 4
    95: 4
    # Moss/Lichen -> other land
    100: 7

io_map:
    # No data
    # Map nodata to 255. That is what DEP Seagrass does. Works with uint8 and is more obviously not a valid class.
    0: 255
    # Water
    1: 6
    # Tree -> Tree cover
    2: 1
    # Wetland
    4: 4
    # Cropland
    5: 3
    # Built-up
    7: 5
    # Bare/Sparse / Snow/Ice / Cloud -> other land
    8: 7
    9: 7
    10: 7
    # Rangeland
    11: 2
